
# Google Cloud Build configuration for FunList.ai
# This file defines the CI/CD pipeline for deploying to Cloud Run

substitutions:
  _REGION: us-west1
  _SERVICE_NAME: funlist
  _MIN_INSTANCES: '1'
  _MAX_INSTANCES: '100'
  _MEMORY: '1Gi'
  _CPU: '1'
  _CONCURRENCY: '80'
  _REQUEST_TIMEOUT: '300'
  _REPOSITORY: funlist
  _COMMIT_SHA: latest

steps:
  # Step 1: Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args: 
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/app:${_COMMIT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/app:latest'
      - '-f'
      - 'Dockerfile'
      - '.'
  
  # Step 2: Push the container image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args: 
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/app'
  
  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy-cloud-run'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/app:${_COMMIT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--service-account=funlist-backend@$PROJECT_ID.iam.gserviceaccount.com'
      - '--min-instances=${_MIN_INSTANCES}'
      - '--max-instances=${_MAX_INSTANCES}'
      - '--memory=${_MEMORY}'
      - '--cpu=${_CPU}'
      - '--concurrency=${_CONCURRENCY}'
      - '--timeout=${_REQUEST_TIMEOUT}'
      - '--port=8080'
      - '--set-env-vars=FLASK_ENV=production'
      - '--set-secrets=DATABASE_URL=DATABASE_URL:latest'
      - '--set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest'

# Specify images to be pushed
images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/app:${_COMMIT_SHA}'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/app:latest'

# Build timeout (45 minutes)
timeout: '2700s'

# Use Cloud Build machine type for faster builds
options:
  logging: CLOUD_LOGGING_ONLY
